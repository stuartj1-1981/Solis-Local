name: "Solis EA Modbus Control"
description: "Active Modbus master for the Solis S6-EA hybrid inverter via a Waveshare RS485 gateway. Polls telemetry and exposes Predbat-ready, safety-clamped control entities over MQTT auto-discovery."
version: "1.0.8"
slug: "solis_ea_modbus"
url: "https://github.com/stuartj1-1981/Solis-Local"
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
startup: application
boot: auto
init: false
options:
  gateway_host: "0.0.0.0"
  gateway_port: 502
  protocol: "tcp"
  slave_address: 1
  mqtt_host: ""
  mqtt_port: 1883
  mqtt_user: ""
  mqtt_pass: ""
  poll_interval: 10
  inter_frame_ms: 400
  enable_control: true
  max_current_a: 105
  export_limit_w: 10000
  debug: false
schema:
  gateway_host: str
  gateway_port: port
  protocol: "list(tcp|rtu_over_tcp)"
  slave_address: "int(1,247)"
  mqtt_host: str?
  mqtt_port: port
  mqtt_user: str?
  mqtt_pass: password?
  poll_interval: "int(2,300)"
  inter_frame_ms: "int(300,5000)"
  enable_control: bool
  max_current_a: "int(1,105)"
  export_limit_w: "int(0,10000)"
  debug: bool
services:
  - mqtt:need
map:
  - share:rw
  - addon_config:rw
